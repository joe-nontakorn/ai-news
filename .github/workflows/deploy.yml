name: Build & Deploy

on:
  push:
    branches:
      - master

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from package.json
        id: pkg_version
        run: |
          VERSION=$(grep '"version"' package.json | head -n 1 | awk -F '"' '{print $4}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            IMAGE_VERSION=${{ env.VERSION }}
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ env.VERSION }},${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy
        run: |
          docker pull ${{ env.IMAGE }}:${{ env.VERSION }}
          docker stop news-bot || true
          docker rm news-bot || true
          docker run -d \
            --name news-bot \
            --restart unless-stopped \
            --env-file /opt/news-bot/.env \
            -p 3000:3000 \
            ${{ env.IMAGE }}:${{ env.VERSION }}
          docker image prune -f
